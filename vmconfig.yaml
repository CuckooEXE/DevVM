# yaml-language-server: $schema=./schema.json
#
# vmconfig.yaml — declarative config for your Debian Trixie dev/research VM.
#
# This is the single source of truth that setup.py reads. Edit freely
# (add/remove packages, pin a tarball version, swap a docker image) and
# re-run the orchestrator.
#
# Typical flow:
#   ./bootstrap.sh full            # install host apt prereqs for setup.py
#   python3 setup.py --mode full   # prepare + install every section below
#
# Mode split (mirrors bootstrap.sh):
#   --mode prepare   fetch artifacts into ./cache/   (online)
#   --mode install   install from ./cache/ only      (can be offline)
#   --mode full      prepare + install               (default)
#
# Useful flags:
#   --only SECTION   limit run to a section; repeatable
#   --skip SECTION   skip a section; repeatable (e.g. --skip github_releases
#                    when GitHub API rate-limits you)
#   --refresh        re-resolve 'latest' tags; ignore vmconfig.lock
#   --dry-run        print actions without executing them
#
# Sections:
#   apt                system packages + 3rd-party apt repos
#   pipx               Python CLI tools globally on $PATH
#   pip_system         Python libs importable from system python3
#   github_releases    single-binary tools from GitHub releases
#   tarballs           generic URL tarballs (Zig, Ghidra)
#   rustup             Rust toolchains, components, targets
#   git_sources        mirrored git clones (wordlists, source builds)
#   docker             container images (docker pull + save to cache)
#   docs               man-db/info rebuilds + zeal docsets
#   fonts              system-wide font archives
#   codium_extensions  Open VSX bundles for VSCodium
#   neovim_offline     LazyVim bundle (see installers/neovim_offline/README.md)

apt:
  # 3rd-party apt repos. The `key_url` GPG key is fetched during prepare
  # and installed under /etc/apt/keyrings/<name>.gpg; a matching entry is
  # written to /etc/apt/sources.list.d/<name>.list.
  repos:
    - name: docker
      uri: https://download.docker.com/linux/debian
      suite: trixie
      components: [stable]
      key_url: https://download.docker.com/linux/debian/gpg

    - name: vscodium
      uri: https://download.vscodium.com/debs
      suite: vscodium
      components: [main]
      arch: amd64
      key_url: https://gitlab.com/paulcarroty/vscodium-deb-rpm-repo/-/raw/master/pub.gpg

  # apt packages. Transitive deps pull in automatically — you only list
  # the headline packages. Inline comments are quick usage hints.
  packages:

    # ── Build / compilers ────────────────────────────────────────────
    # C/C++ toolchains, build systems, autotools.
    - build-essential           # gcc + g++ + make + libc-dev meta
    - gcc                       # gcc -O2 -o hello hello.c
    - g++                       # g++ -std=c++20 -o app app.cpp
    - clang                     # clang -O2 -o hello hello.c
    - clang-tools               # clangd (LSP), scan-build
    - clang-tidy                # clang-tidy src/*.cpp --checks='*'
    - clang-format              # clang-format -i src/*.cpp
    - lld                       # clang -fuse-ld=lld
    - lldb                      # lldb ./a.out
    - gdb                       # gdb ./a.out
    - gdb-multiarch             # gdb-multiarch for cross-arch debugging
    - cmake                     # cmake -B build && cmake --build build
    - ninja-build               # ninja -C build
    - meson                     # meson setup build && meson compile -C build
    - pkg-config                # pkg-config --cflags --libs glib-2.0
    - autoconf                  # autoreconf -i && ./configure
    - automake
    - libtool

    # ── Languages (non-Rust, non-Zig) ────────────────────────────────
    # rustup/Zig are handled in their own sections below.
    - python3                   # python3 -c 'print("hi")'
    - python3-dev               # headers for building C extensions
    - python3-venv              # python3 -m venv .venv
    - python3-pip               # pip install <pkg>  (prefer pipx/pip_system)
    - python3-setuptools        # required by pip_system for sdists
    - pipx                      # pipx install <cli>
    - default-jdk               # javac Hello.java && java Hello
    - maven                     # mvn package
    - gradle                    # gradle build

    # ── Reverse engineering / binary analysis ────────────────────────
    # Rizin (radare2 fork), Cutter, keystone, and honggfuzz are built
    # from source via git_sources — they're not packaged for Trixie.
    - socat                     # socat TCP-LISTEN:4444,reuseaddr,fork EXEC:/bin/sh
    - netcat-openbsd            # nc -lvnp 4444
    - strace                    # strace -f -e openat ./a.out
    - ltrace                    # ltrace ./a.out
    - edb-debugger              # edb --run ./a.out   (ELF debugger, GUI)
    - ddd                       # ddd ./a.out         (GUI frontend for gdb)
    - qemu-user                 # qemu-aarch64 ./arm-bin   (user-mode emulation)
    - qemu-user-static          # statically-linked qemu-* for binfmt
    - qemu-system-x86           # qemu-system-x86_64 -hda disk.img
    - qemu-system-arm           # qemu-system-aarch64 -M virt -kernel Image
    - qemu-system-mips          # qemu-system-mips -kernel vmlinux
    - qemu-utils                # qemu-img info disk.qcow2
    - patchelf                  # patchelf --set-interpreter /lib/ld-linux.so.2 ./bin
    - upx-ucl                   # upx -d packed-bin
    - hexedit                   # hexedit file.bin
    - bsdextrautils             # hexdump -C file.bin
    - file                      # file suspicious-blob
    - binutils                  # objdump -d, nm, strings, readelf, ld
    - elfutils                  # eu-readelf -a ./bin; eu-addr2line
    - apktool                   # apktool d app.apk
    - openssl                   # openssl x509 -in cert.pem -text
    - nasm                      # nasm -f elf64 shellcode.asm
    - yasm                      # yasm -f elf64 shellcode.asm
    - libc6-dbg                 # glibc debug symbols (required by gef)
    - gcc-multilib              # gcc -m32 for 32-bit binaries
    - g++-multilib              # g++ -m32
    - musl-tools                # musl-gcc -static -o tiny hello.c
    - valgrind                  # valgrind --leak-check=full ./a.out
    - checksec                  # checksec --file=./bin
    - libcapstone-dev           # libs + headers for capstone (disassembler)
    - capstone-tool             # cstool x64 "48 83 ec 08"

    # ── Fuzzing ──────────────────────────────────────────────────────
    # honggfuzz is built from git_sources below and uses libbfd-dev +
    # libunwind-dev at link time.
    - afl++                     # afl-fuzz -i in -o out -- ./target @@
    - libbfd-dev                # honggfuzz link dep
    - libunwind-dev             # honggfuzz link dep
    - libfuse2t64               # lets the Cutter AppImage (github_releases) run

    # ── Pentesting / network recon ───────────────────────────────────
    # nikto, Responder, and enum4linux-ng come from git_sources/pipx.
    - nmap                      # nmap -sV -A -p- 10.0.0.1
    - tcpdump                   # tcpdump -i any -n port 80
    - wireshark                 # wireshark           (GUI)
    - tshark                    # tshark -i any -Y http
    - masscan                   # masscan 10.0.0.0/24 -p80,443 --rate=10000
    - proxychains4              # proxychains4 curl https://target
    - whois                     # whois example.com
    - dnsutils                  # dig example.com; nslookup example.com
    - ldap-utils                # ldapsearch -x -H ldap://host -b dc=x
    - smbclient                 # smbclient -L //host -U user
    - samba-common-bin          # nmblookup, net
    - snmp                      # snmpwalk -v2c -c public 10.0.0.1
    - snmp-mibs-downloader      # populates /var/lib/mibs for snmpwalk -m
    - onesixtyone               # onesixtyone -c communities.txt 10.0.0.0/24
    - netdiscover               # netdiscover -i eth0 -r 192.168.1.0/24
    - arp-scan                  # arp-scan --localnet

    # ── Web-app testing ──────────────────────────────────────────────
    - sqlmap                    # sqlmap -u 'https://t/?id=1' --batch
    - dirb                      # dirb https://target wordlist.txt
    - wfuzz                     # wfuzz -c -z file,words.txt 'https://t/FUZZ'
    - ffuf                      # ffuf -u 'https://t/FUZZ' -w words.txt
    - whatweb                   # whatweb https://target

    # ── Password attacks ─────────────────────────────────────────────
    # Defensive use only: CTFs, your own infra, authorized engagements.
    # Wordlists (SecLists) live under git_sources; too large for apt.
    - hydra                     # hydra -l admin -P rockyou.txt ssh://10.0.0.1
    - john                      # john --wordlist=rockyou.txt hashes.txt
    - hashcat                   # hashcat -m 1000 hashes.txt rockyou.txt
    - hashid                    # hashid <hash>

    # ── Wireless ─────────────────────────────────────────────────────
    # Drop these if the VM has no wifi passthrough.
    - aircrack-ng               # aircrack-ng -w rockyou.txt capture.cap
    - reaver                    # reaver -i wlan0mon -b BSSID -vv

    # ── Forensics ────────────────────────────────────────────────────
    - sleuthkit                 # fls, icat, mmls (filesystem forensics)
    - foremost                  # foremost -t all -i disk.img -o out
    - scalpel                   # scalpel -c scalpel.conf -o out disk.img
    - libimage-exiftool-perl    # exiftool photo.jpg

    # ── Observability / kernel tracing ───────────────────────────────
    - bpftrace                  # bpftrace -e 'tracepoint:syscalls:sys_enter_openat { ... }'
    - linux-perf                # perf record -g ./a.out; perf report
    - sysstat                   # iostat -xz 1; pidstat -u 1; sar -u 1
    - iotop                     # iotop
    - iftop                     # iftop -i eth0
    - nethogs                   # nethogs

    # ── Dev accelerators ─────────────────────────────────────────────
    - ccache                    # export CC='ccache gcc'
    - direnv                    # echo 'export X=1' > .envrc && direnv allow
    - entr                      # ls *.c | entr -c make
    - moreutils                 # sponge, ts, vidir, chronic, parallel

    # ── Docs / man ───────────────────────────────────────────────────
    - man-db                    # man <topic>; mandb; whatis <topic>
    - manpages                  # base section 1-8 manpages
    - manpages-dev              # section 2/3 dev manpages (syscalls, libc)
    - manpages-posix            # POSIX section 1p manpages
    - manpages-posix-dev        # POSIX section 3p manpages
    - info                      # info <topic>
    - texinfo                   # makeinfo foo.texi
    - cppreference-doc-en-html  # /usr/share/cppreference/doc/html/index.html
    - python3-doc               # /usr/share/doc/python3-doc
    - linux-doc                 # /usr/share/doc/linux-doc
    - gcc-doc                   # info gcc

    # ── Shell / general utilities ────────────────────────────────────
    - zsh                       # zsh
    - zsh-autosuggestions       # sourced by post/10-shell.sh
    - tmux                      # tmux new -s work
    - terminator                # terminator            (preferred terminal)
    - neovim                    # nvim <file>           (base apt version)
    - vim                       # vim <file>
    - htop                      # htop
    - tree                      # tree -L 2
    - jq                        # curl -s api/ | jq '.items[0]'
    - curl                      # curl -sSL https://example.com
    - wget                      # wget -c https://...
    - rsync                     # rsync -avz src/ host:dest/
    - git                       # git status
    - git-lfs                   # git lfs track '*.bin'
    - unzip                     # unzip file.zip
    - p7zip-full                # 7z x file.7z
    - zstd                      # zstd -19 file
    - ca-certificates           # /etc/ssl/certs, updated by apt
    - gnupg                     # gpg --verify file.sig file
    - apt-transport-https       # HTTPS transport for apt (VSCodium repo)
    - fontconfig                # fc-cache -f <dir>  (drives the fonts section)

    # ── Docker engine (from the docker repo above) ───────────────────
    - docker-ce                 # docker run hello-world
    - docker-ce-cli             # docker ps
    - containerd.io             # OCI runtime (used by dockerd)
    - docker-buildx-plugin      # docker buildx build --platform linux/arm64 .
    - docker-compose-plugin     # docker compose up -d

    # ── Virtualization (libvirt + cloud-init tooling) ────────────────
    # Backs bin/vm-manager.sh: libvirt for VM lifecycle, virtinst for
    # `virt-install`/`virt-clone`, cloud-image-utils for cloud-localds
    # (builds cloud-init seed ISOs), and the network/ISO build deps
    # libvirt-daemon-system would otherwise pull via Recommends.
    - libvirt-daemon-system     # libvirtd + default NAT network/pool
    - libvirt-clients           # virsh
    - virtinst                  # virt-install <name> --import; virt-clone
    - cloud-image-utils         # cloud-localds seed.iso user-data meta-data
    - bridge-utils              # libvirt bridge networking (brctl)
    - dnsmasq-base              # libvirt's NAT DHCP/DNS for the default net
    - genisoimage               # ISO 9660 builder used by cloud-localds

    # ── Editor (from the vscodium repo above) ────────────────────────
    # VSCodium = VSCode without Microsoft branding/telemetry, configured
    # against Open VSX (https://open-vsx.org) instead of the Microsoft
    # marketplace. The `codium` postinst asks no debconf questions.
    - codium                    # codium <dir>

    # ── Offline doc viewer ───────────────────────────────────────────
    - zeal                      # zeal  (GUI for the docs.zeal_docsets below)

pipx:
  # Python CLI tools, each in its own venv, globally on $PATH.
  packages:

    # ── Dev workflow ─────────────────────────────────────────────────
    - commitizen                # cz commit
    - poetry                    # poetry new myproj
    - pre-commit                # pre-commit run --all-files
    - ipython                   # ipython
    - ruff                      # ruff check .; ruff format .
    - black                     # black src/
    - mypy                      # mypy src/
    - uv                        # uv pip install foo   (fast pip replacement)
    - httpie                    # http GET example.com

    # ── RE / vuln research / pentest CLIs ────────────────────────────
    - ropper                    # ropper --file ./bin --search 'pop rdi'
    - ROPgadget                 # ROPgadget --binary ./bin
    - frida-tools               # frida-trace -U -i open com.target.app
    - objection                 # objection -g com.target.app explore
    - mitmproxy                 # mitmproxy -p 8080
    - sslyze                    # sslyze example.com
    - volatility3               # vol -f mem.raw windows.info
    - yara                      # yara rules.yar ./sample
    - impacket                  # impacket-secretsdump user@host
    - pipreqs                   # pipreqs ./project    (reqs.txt from imports)

    # Packages that aren't on PyPI — installed from their git repos.
    # pipx accepts git+URL specs directly.
    - git+https://github.com/Pennyw0rth/NetExec.git        # nxc smb 10.0.0.0/24
    - git+https://github.com/cddmp/enum4linux-ng.git       # enum4linux-ng -A 10.0.0.1

pip_system:
  # Python libraries importable from any `python3` REPL. Installed with
  # --break-system-packages. For CLI tools use pipx instead.
  packages:

    # ── Exploitation / RE ────────────────────────────────────────────
    - pwntools                  # from pwn import *
    - capstone                  # from capstone import *
    - unicorn                   # from unicorn import Uc
    - keystone-engine           # from keystone import Ks
    - lief                      # import lief; lief.parse('bin')
    - r2pipe                    # import r2pipe; r2pipe.open('bin')
    - rzpipe                    # import rzpipe; rzpipe.open('bin')
    - z3-solver                 # from z3 import *
    - yara-python               # import yara; yara.compile(...)
    - frida                     # import frida

    # ── Network / web research ───────────────────────────────────────
    - scapy                     # from scapy.all import *
    - requests                  # import requests
    - requests-toolbelt         # from requests_toolbelt import MultipartEncoder

github_releases:
  # Single-binary tools from GitHub Releases. Each entry resolves the
  # latest tag, caches the archive under cache/github/, then installs
  # the declared `bin:` / `man:` files. Re-run with --refresh to bump.

  # ── Daily-driver CLIs ──────────────────────────────────────────────
  - repo: BurntSushi/ripgrep              # rg -nF 'TODO' src/
    asset_regex: 'ripgrep-.*-x86_64-unknown-linux-musl\.tar\.gz$'
    strip_components: 1
    bin:
      - {src: rg, dest: /usr/local/bin/rg}
    man:
      - {src: doc/rg.1, dest: /usr/local/share/man/man1/rg.1}

  - repo: sharkdp/fd                      # fd -e rs
    asset_regex: 'fd-.*-x86_64-unknown-linux-gnu\.tar\.gz$'
    strip_components: 1
    bin:
      - {src: fd, dest: /usr/local/bin/fd}

  - repo: sharkdp/bat                     # bat src/main.rs
    asset_regex: 'bat-v.*-x86_64-unknown-linux-gnu\.tar\.gz$'
    strip_components: 1
    bin:
      - {src: bat, dest: /usr/local/bin/bat}

  - repo: junegunn/fzf                    # vim $(fzf)
    asset_regex: 'fzf-.*-linux_amd64\.tar\.gz$'
    bin:
      - {src: fzf, dest: /usr/local/bin/fzf}

  - repo: dandavison/delta                # git diff (configure as core.pager)
    asset_regex: 'delta-.*-x86_64-unknown-linux-gnu\.tar\.gz$'
    strip_components: 1
    bin:
      - {src: delta, dest: /usr/local/bin/delta}

  - repo: eza-community/eza               # eza -la --git
    asset_regex: 'eza_x86_64-unknown-linux-gnu\.tar\.gz$'
    bin:
      - {src: eza, dest: /usr/local/bin/eza}

  - repo: jesseduffield/lazygit           # lazygit
    asset_regex: 'lazygit_.*_linux_x86_64\.tar\.gz$'
    bin:
      - {src: lazygit, dest: /usr/local/bin/lazygit}

  - repo: cli/cli                         # gh pr create
    asset_regex: 'gh_.*_linux_amd64\.tar\.gz$'
    strip_components: 1
    bin:
      - {src: bin/gh, dest: /usr/local/bin/gh}

  - repo: starship/starship               # eval "$(starship init zsh)"
    asset_regex: 'starship-x86_64-unknown-linux-gnu\.tar\.gz$'
    bin:
      - {src: starship, dest: /usr/local/bin/starship}

  - repo: atuinsh/atuin                   # magical shell history
    asset_regex: 'atuin-x86_64-unknown-linux-gnu\.tar\.gz$'
    strip_components: 1
    bin:
      - {src: atuin, dest: /usr/local/bin/atuin}

  # ── Recon / web testing (ProjectDiscovery suite + friends) ────────
  - repo: projectdiscovery/nuclei         # nuclei -u https://t -t cves/
    asset_regex: 'nuclei_.*_linux_amd64\.zip$'
    bin:
      - {src: nuclei, dest: /usr/local/bin/nuclei}

  - repo: projectdiscovery/httpx          # cat hosts.txt | pdhttpx
    asset_regex: 'httpx_.*_linux_amd64\.zip$'
    bin:
      # Installed as `pdhttpx` so it doesn't clash with Python's httpx.
      - {src: httpx, dest: /usr/local/bin/pdhttpx}

  - repo: projectdiscovery/subfinder      # subfinder -d example.com
    asset_regex: 'subfinder_.*_linux_amd64\.zip$'
    bin:
      - {src: subfinder, dest: /usr/local/bin/subfinder}

  - repo: projectdiscovery/naabu          # naabu -host 10.0.0.1
    asset_regex: 'naabu_.*_linux_amd64\.zip$'
    bin:
      - {src: naabu, dest: /usr/local/bin/naabu}

  - repo: projectdiscovery/katana         # katana -u https://target
    asset_regex: 'katana_.*_linux_amd64\.zip$'
    bin:
      - {src: katana, dest: /usr/local/bin/katana}

  - repo: OJ/gobuster                     # gobuster dir -u https://t -w words.txt
    asset_regex: 'gobuster_linux_x86_64\.tar\.gz$'
    bin:
      - {src: gobuster, dest: /usr/local/bin/gobuster}

  - repo: jpillora/chisel                 # chisel server -p 8000 --reverse
    asset_regex: 'chisel_.*_linux_amd64\.gz$'
    bin:
      - {src: chisel, dest: /usr/local/bin/chisel}

  # ── Secrets scanners ──────────────────────────────────────────────
  - repo: trufflesecurity/trufflehog      # trufflehog git file:///path
    asset_regex: 'trufflehog_.*_linux_amd64\.tar\.gz$'
    bin:
      - {src: trufflehog, dest: /usr/local/bin/trufflehog}

  - repo: gitleaks/gitleaks               # gitleaks dir .
    asset_regex: 'gitleaks_.*_linux_x64\.tar\.gz$'
    bin:
      - {src: gitleaks, dest: /usr/local/bin/gitleaks}

  # ── Dev utilities ─────────────────────────────────────────────────
  - repo: casey/just                      # just -l; just build
    asset_regex: 'just-.*-x86_64-unknown-linux-musl\.tar\.gz$'
    bin:
      - {src: just, dest: /usr/local/bin/just}

  - repo: watchexec/watchexec             # watchexec -e rs 'cargo test'
    asset_regex: 'watchexec-.*-x86_64-unknown-linux-musl\.tar\.xz$'
    strip_components: 1
    bin:
      - {src: watchexec, dest: /usr/local/bin/watchexec}

  - repo: sharkdp/hyperfine               # hyperfine 'cmd1' 'cmd2'
    asset_regex: 'hyperfine-.*-x86_64-unknown-linux-gnu\.tar\.gz$'
    strip_components: 1
    bin:
      - {src: hyperfine, dest: /usr/local/bin/hyperfine}

  - repo: jesseduffield/lazydocker        # lazydocker
    asset_regex: 'lazydocker_.*_linux_x86_64\.tar\.gz$'
    bin:
      - {src: lazydocker, dest: /usr/local/bin/lazydocker}

  # cutter — RE GUI for rizin. Ships as an AppImage; libfuse2t64 (apt)
  # provides FUSE2 so the AppImage can mount itself.
  - repo: rizinorg/cutter                 # cutter <binary>
    asset_regex: 'Cutter-.*-Linux-Qt5-x86_64.AppImage'
    bin:
      - {src: 'Cutter-*.AppImage', dest: /usr/local/bin/cutter}

tarballs:
  # Generic URL tarballs. `resolve: zig-index` reads ziglang.org's JSON
  # index; `resolve: github-release` uses the GitHub API like
  # github_releases does. `symlinks:` wire a stable path into /usr/local/bin.
  - name: zig                             # zig version
    resolve: zig-index
    url: https://ziglang.org/download/index.json
    install_dir: /opt/zig
    symlinks:
      - {src: /opt/zig/current/zig, dest: /usr/local/bin/zig}

  - name: ghidra                          # ghidraRun
    resolve: github-release
    url: NationalSecurityAgency/ghidra
    asset_regex: 'ghidra_.*_PUBLIC_.*\.zip$'
    install_dir: /opt/ghidra
    symlinks:
      - {src: /opt/ghidra/current/ghidraRun, dest: /usr/local/bin/ghidraRun}

rustup:
  # Rust toolchains (rustc/cargo). Components and targets are added to
  # the default toolchain. Installer drops a portable cache/rustup/ tree
  # that installs cleanly on a fresh offline host.
  toolchains: [stable, nightly]
  default: stable
  components:
    - rust-src
    - rust-analyzer             # rust-analyzer  (LSP; LazyVim uses it)
    - clippy                    # cargo clippy
    - rustfmt                   # cargo fmt
    - llvm-tools-preview        # cargo-llvm-cov etc.
  targets:
    - x86_64-unknown-linux-musl # static linux builds
    - wasm32-unknown-unknown    # wasm builds

git_sources:
  # Mirrored git clones. `depth: 1` (default) = shallow single-branch;
  # `depth: -1` = full clone with all branches + history.
  # `post_install:` runs shell commands in the dest dir after clone.
  # `skip_if_command:` short-circuits post_install when that cmd exists.

  # ── GDB enhancements ──────────────────────────────────────────────
  - url: https://github.com/hugsy/gef     # GDB Enhanced Features
    dest: ~/src/gef
    branch: main
    post_install:
      - ln -sf "$PWD/gef.py" "$HOME/.gdbinit-gef.py"
      - |
        grep -qxF 'source ~/.gdbinit-gef.py' "$HOME/.gdbinit" 2>/dev/null \
          || echo 'source ~/.gdbinit-gef.py' >> "$HOME/.gdbinit"

  - url: https://github.com/hugsy/gef-extras    # extra GEF commands/structs
    dest: ~/src/gef-extras
    branch: main
    post_install:
      - |
        CFG="$HOME/.gef.rc"
        SCRIPTS_DIR="$PWD/scripts"
        touch "$CFG"
        grep -q "extra_plugins_dir" "$CFG" \
          || printf '[gef]\nextra_plugins_dir = %s\n' "$SCRIPTS_DIR" >> "$CFG"

  - url: https://github.com/pwndbg/pwndbg       # alternative GDB frontend
    dest: ~/src/pwndbg
    branch: dev
    # No post_install — run ./setup.sh manually when you want it enabled.

  # ── Tools built from source (not in Debian) ───────────────────────
  - url: https://github.com/keystone-engine/keystone    # kstool (assembler)
    dest: ~/src/keystone
    branch: master
    skip_if_command: kstool
    post_install:
      - mkdir -p build
      - |
        cd build && cmake -G Ninja -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_LIBS_ONLY=0 -DLLVM_TARGETS_TO_BUILD=all ..
      - cmake --build build --parallel
      - sudo cmake --install build
      - sudo ldconfig

  - url: https://github.com/rizinorg/rizin       # rizin (maintained radare2 fork)
    dest: ~/src/rizin
    branch: dev
    skip_if_command: rizin
    post_install:
      - meson setup build --buildtype=release
      - ninja -C build
      - sudo ninja -C build install
      - sudo ldconfig

  - url: https://github.com/google/honggfuzz     # coverage-guided fuzzer
    dest: ~/src/honggfuzz
    branch: master
    skip_if_command: honggfuzz
    post_install:
      - make
      - sudo make install

  - url: https://github.com/sullo/nikto          # nikto -h https://target
    dest: ~/src/nikto
    skip_if_command: nikto
    post_install:
      - sudo ln -sf "$PWD/program/nikto.pl" /usr/local/bin/nikto

  - url: https://github.com/lgandx/Responder     # sudo responder -I eth0
    dest: ~/src/Responder
    branch: master
    skip_if_command: responder
    post_install:
      # Tiny wrapper so `responder` is on $PATH; Responder needs to run
      # from its own dir for relative paths to resolve.
      - |
        sudo tee /usr/local/bin/responder >/dev/null <<EOF
        #!/usr/bin/env bash
        cd $PWD && exec python3 Responder.py "\$@"
        EOF
      - sudo chmod 0755 /usr/local/bin/responder

  # ── Firmware analysis ─────────────────────────────────────────────
  - url: https://github.com/ReFirmLabs/binwalk   # binwalk <firmware>
    dest: ~/src/binwalk
    branch: master
    skip_if_command: binwalk
    post_install:
      # Build the docker image locally; post/40-binwalk-wrapper.sh wraps
      # it under /usr/local/bin/binwalk.
      - |
        if docker info >/dev/null 2>&1; then
          docker build -t devvmsetup/binwalk:local .
        else
          sudo docker build -t devvmsetup/binwalk:local .
        fi

  # ── Themes / dotfiles ─────────────────────────────────────────────
  - url: https://github.com/dracula/terminator   # Dracula Terminator theme
    dest: ~/src/dracula-terminator
    branch: master
    # Applied by post/06-dracula-terminator.sh.

  - url: https://github.com/ohmyzsh/ohmyzsh      # Oh My Zsh
    dest: ~/src/ohmyzsh
    branch: master
    # Wired into /usr/local/share/oh-my-zsh by post/15-oh-my-zsh.sh.
    # This clone's main purpose is to populate cache/git_sources/ohmyzsh.git
    # so the post script can copy from the mirror offline.

  # ── RE / exploit source references (read-only clones) ────────────
  - url: https://github.com/JonathanSalwan/ROPgadget
    dest: ~/src/ROPgadget
    branch: master
    # Also installed via pipx; this clone is for hacking on the source.

  - url: https://github.com/angr/angr
    dest: ~/src/angr
    branch: master
    # angr is heavy — `pip install angr` in a venv for runtime. This
    # clone is for reading the source.

  # ── Wordlists / payload collections / cheat sheets ────────────────
  # SecLists alone is ~1 GB after clone. Shallow single-branch by
  # default. Set `depth: -1` on an entry to keep full history.
  - url: https://github.com/danielmiessler/SecLists
    dest: ~/sec/SecLists
    branch: master

  - url: https://github.com/swisskyrepo/PayloadsAllTheThings
    dest: ~/sec/PayloadsAllTheThings
    branch: master

  - url: https://github.com/carlospolop/PEASS-ng
    dest: ~/sec/PEASS-ng
    branch: master

  - url: https://github.com/GTFOBins/GTFOBins.github.io
    dest: ~/sec/GTFOBins
    branch: master

  - url: https://github.com/LOLBAS-Project/LOLBAS
    dest: ~/sec/LOLBAS
    branch: master

  - url: https://github.com/HackTricks-wiki/hacktricks
    dest: ~/sec/hacktricks
    branch: master

docker:
  # Container images. `save_to_cache: true` runs `docker save` after each
  # pull so install-mode can `docker load` offline.
  save_to_cache: true
  images:

    # ── Base OS images ──────────────────────────────────────────────
    - debian:trixie                       # docker run --rm -it debian:trixie
    - debian:trixie-slim
    - ubuntu:latest
    - alpine:latest
    - kalilinux/kali-rolling:latest       # docker run --rm -it kalilinux/kali-rolling
    - remnux/remnux-distro:focal          # malware RE toolkit

    # ── Language runtimes ───────────────────────────────────────────
    - python:3
    - python:3-slim
    - node:lts
    - golang:latest
    - rust:latest
    - eclipse-temurin:21                  # OpenJDK 21

    # ── Services ────────────────────────────────────────────────────
    - redis:latest                        # docker run -d -p 6379:6379 redis
    - postgres:latest                     # docker run -d -e POSTGRES_PASSWORD=x postgres
    - nginx:latest                        # docker run -d -p 8080:80 nginx

    # ── Offensive tooling in containers ─────────────────────────────
    - metasploitframework/metasploit-framework:latest  # docker run --rm -it … msfconsole
    - mitmproxy/mitmproxy:latest          # mitmproxy is also in pipx; image for CI
    - zaproxy/zap-stable:latest           # docker run -u zap -p 8080:8080 zaproxy/zap-stable zap.sh

    # ── Intentionally vulnerable targets (practice / research) ──────
    - bkimminich/juice-shop:latest        # OWASP Juice Shop
    - vulnerables/web-dvwa:latest         # DVWA
    - webgoat/webgoat:latest              # OWASP WebGoat

docs:
  # man-db/info index refresh + zeal docsets (download from Kapeli's CDN
  # into cache/docsets/ during prepare). An invalid name logs a warning
  # and skips without failing the run.
  rebuild_mandb: true
  rebuild_info: true
  zeal_docsets:
    # Docset names match feed files at https://github.com/Kapeli/feeds
    # (the stem of `<name>.xml` on the mirror).

    # ── Languages you work in ───────────────────────────────────────
    - C
    - C++
    - Rust
    - Bash

    # ── Languages you read 3rd-party code in ────────────────────────
    - Go
    - Java
    - JavaScript
    - TypeScript

    # ── System / Unix reference ─────────────────────────────────────
    - Man_Pages

    # ── Build / infra tooling ───────────────────────────────────────
    - CMake
    - Docker
    - Vim

    # ── Quick-lookup references ─────────────────────────────────────
    - HTTP
    - Markdown

    # ── Databases ───────────────────────────────────────────────────
    - PostgreSQL
    - SQLite
    - Redis

fonts:
  # System-wide font archives. Prepare caches the zip under
  # cache/fonts/<name>/; install extracts matching files under
  # install_dir and runs fc-cache.
  - name: JetBrainsMono-Nerd
    url: https://github.com/ryanoasis/nerd-fonts/releases/latest/download/JetBrainsMono.zip
    install_dir: /usr/share/fonts/truetype/jetbrains-mono-nerd
    extract_pattern: "*.ttf"

codium_extensions:
  # Installed via `codium --install-extension` as the invoking user. The
  # prepare step queries the Open VSX REST API for latest versions and
  # caches the .vsix bundles under cache/codium/.
  #
  # Several Microsoft-published extensions are *not* listed here even
  # though they appear on Open VSX, because they are license-locked at
  # runtime and refuse to load on non-Microsoft builds (Pylance, the
  # cpptools family, all ms-vscode-remote.*, ms-dotnettools.csharp,
  # ms-vscode.hexeditor). Replacements below: pyright for Pylance,
  # vscode-clangd for cpptools, jeanp413.open-remote-ssh for remote-ssh.
  extensions:
    # ── Python ──────────────────────────────────────────────────────
    - ms-python.python
    - ms-python.debugpy
    - ms-python.black-formatter
    - ms-pyright.pyright          # OSS Pyright LSP (Pylance replacement)
    - ms-toolsai.jupyter
    - njpwerner.autodocstring
    - donjayamanne.python-extension-pack

    # ── C / C++ / CMake / Make ──────────────────────────────────────
    - llvm-vs-code-extensions.vscode-clangd   # clangd LSP (cpptools replacement)
    - xaver.clang-format
    - twxs.cmake
    - cschlosser.doxdocgen

    # ── Other languages ─────────────────────────────────────────────
    - ziglang.vscode-zig
    - rust-lang.rust-analyzer
    - redhat.java
    - vadimcn.vscode-lldb

    # ── Remote dev ──────────────────────────────────────────────────
    # Microsoft's Remote-* extension pack is locked to MS builds.
    # open-remote-ssh is the OSS fork that works on VSCodium.
    - jeanp413.open-remote-ssh
    - ms-azuretools.vscode-docker

    # ── Formats / misc ──────────────────────────────────────────────
    - redhat.vscode-yaml
    - esbenp.prettier-vscode
    - yzhang.markdown-all-in-one
    - DavidAnson.vscode-markdownlint
    - dracula-theme.theme-dracula

neovim_offline:
  # Air-gap-safe LazyVim bundle. The `prepare` phase runs stage.sh
  # (downloads nvim/node/jdk, clones plugins, installs Mason servers,
  # compiles treesitter parsers) into cache/neovim_offline/. The
  # `install` phase runs install.sh, deploying to the invoking user's
  # $HOME. See installers/neovim_offline/README.md for details.
  enabled: true

  # stage_mode:
  #   all    — fetch tarballs + resolve plugins/mason/treesitter
  #            (needs gcc/make/unzip on PATH; bootstrap.sh provides them)
  #   fetch  — download tarballs only; skip headless nvim run
  #   none   — skip staging; install still deploys from the cache if present
  stage_mode: all
